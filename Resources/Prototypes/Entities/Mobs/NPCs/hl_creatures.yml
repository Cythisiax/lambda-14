# #Cythisiax Edited - HL2 Creature NPCs
# Sprites ported from halflife-episode13 (Marmio64)

# ===== HEADCRAB =====
- type: entity
  name: headcrab
  parent: [ SimpleMobBase, MobCombat ]
  id: MobHeadcrab
  description: A parasitic alien creature that latches onto hosts.
  components:
  - type: MovementSpeedModifier
    baseWalkSpeed: 4
    baseSprintSpeed: 7
  - type: Sprite
    drawdepth: Mobs
    layers:
    - map: ["enum.DamageStateVisualLayers.Base"]
      state: headcrab
      sprite: _HL/mob/halflife.rsi
  - type: DamageStateVisuals
    states:
      Alive:
        Base: headcrab
      Dead:
        Base: headcrab_dead
  - type: MeleeWeapon
    attackRate: 1
    damage:
      types:
        Slash: 5

- type: entity
  name: fast headcrab
  parent: MobHeadcrab
  id: MobFastHeadcrab
  description: A faster, more aggressive headcrab variant.
  components:
  - type: Sprite
    layers:
    - map: ["enum.DamageStateVisualLayers.Base"]
      state: fastcrab
      sprite: _HL/mob/halflife.rsi
  - type: MovementSpeedModifier
    baseWalkSpeed: 6
    baseSprintSpeed: 10
  - type: DamageStateVisuals
    states:
      Alive:
        Base: fastcrab
      Dead:
        Base: fastcrab_dead

- type: entity
  name: poison headcrab
  parent: MobHeadcrab
  id: MobPoisonHeadcrab
  description: A venomous headcrab with a toxic bite.
