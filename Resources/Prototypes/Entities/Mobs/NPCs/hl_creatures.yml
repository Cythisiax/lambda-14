      state: manhack_nolight
      sprite: _HL/mob/halflife.rsi
  - type: DamageStateVisuals
    states:
      Alive:
        Base: manhack_nolight
      Dead:
        Base: manhack_nolight
  - type: MeleeWeapon
    attackRate: 2
    damage:
      types:
        Slash: 8
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.3
        density: 5
        mask:
        - FlyingMobMask
        layer:
        - FlyingMobLayer

