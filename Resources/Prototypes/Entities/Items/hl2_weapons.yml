# #Misfits Change - HL2 Weapon Prototypes
# Sprites ported from halflife-episode13 (Marmio64)

# ===== USP MATCH PISTOL =====
- type: entity
  parent: BaseItem
  id: WeaponPistolUSP
  name: USP Match
  description: A semi-automatic pistol used by Combine Civil Protection officers.
  components:
  - type: Sprite
    sprite: _HL2/obj/guns/projectile.rsi
    state: uspmatch
  - type: Clothing
    sprite: _HL2/mob/inhands/guns_lefthand.rsi
    clothingVisuals:
      left:
      - state: usp
      right:
      - state: usp
  - type: Gun
    fireRate: 4
    shotsPerBurst: 1
    selectedMode: SemiAuto
    availableModes:
    - SemiAuto
  - type: ChamberMagazineAmmoProvider
    mag: MagazinePistol

