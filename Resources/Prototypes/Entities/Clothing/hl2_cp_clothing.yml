# #Misfits Change - HL2 Civil Protection Clothing Items
# Sprites ported from halflife-episode13 (Marmio64)

# ===== HEADGEAR =====
- type: entity
  parent: ClothingHeadBase
  id: ClothingHeadHatCpCap
  name: CP cap
  description: A standard-issue Civil Protection cap with the Universal Union insignia.
  components:
  - type: Sprite
    sprite: _HL2/obj/clothing/hats.rsi
    state: military
  - type: Clothing
    sprite: _HL2/mob/clothing/head.rsi
    clothingVisuals:
      head:
      - state: milhelm

- type: entity
  parent: ClothingHeadBase
  id: ClothingHeadHatCpHelmet
  name: CP helmet
  description: A reinforced Civil Protection helmet with visor.
  components:
  - type: Sprite
    sprite: _HL2/obj/clothing/hats.rsi
    state: milhelm
  - type: Clothing
    sprite: _HL2/mob/clothing/head.rsi
    clothingVisuals:
      head:
      - state: military
  - type: Armor
    modifiers:
      coefficients:
        Blunt: 0.9
        Slash: 0.9
  - type: Tag
    tags:
    - WhitelistChameleon
  - type: HideLayerClothing
    layers:
      HeadTop: HEAD
      HeadSide: HEAD

- type: entity
  parent: ClothingHeadBase
  id: ClothingHeadHatCpCaptain
  name: CP captain cap
  description: A distinguished cap worn by Civil Protection Captains.
  components:
  - type: Sprite
    sprite: _HL2/obj/clothing/hats.rsi
    state: beret
  - type: Clothing
    sprite: _HL2/mob/clothing/head.rsi
    clothingVisuals:
      head:
      - state: beret

- type: entity
  parent: ClothingHeadBase
  id: ClothingHeadHatOverwatch
  name: Overwatch beret
  description: A crisp beret denoting Overwatch division membership.
  components:
  - type: Sprite
    sprite: _HL2/obj/clothing/hats.rsi
    state: beret
  - type: Clothing
    sprite: _HL2/mob/clothing/head.rsi
    clothingVisuals:
      head:
      - state: beret
  - type: HideLayerClothing
    layers:
      HeadTop: HEAD
      HeadSide: HEAD

- type: entity
  parent: ClothingHeadBase
  id: ClothingHeadHelmetCombine
  name: Combine helmet
  description: Full-face helmet issued to Combine Transhuman Arm soldiers.
  components:
  - type: Sprite
    sprite: _HL2/obj/clothing/hats.rsi
    state: steel_helmet
  - type: Clothing
    sprite: _HL2/mob/clothing/head.rsi
    clothingVisuals:
      head:
      - state: steel_helmet
  - type: Armor
    modifiers:
      coefficients:
        Blunt: 0.85
        Slash: 0.85
        Piercing: 0.9
  - type: HideLayerClothing
    layers:
      HeadTop: HEAD
      HeadSide: HEAD
      Hair: HEAD

- type: entity
  parent: ClothingHeadBase
  id: ClothingHeadHelmetElite
  name: elite Combine helmet
  description: An advanced enclosed helmet for Elite Transhuman soldiers.
  components:
  - type: Sprite
    sprite: _HL2/obj/clothing/hats.rsi
    state: steel_helmet
  - type: Clothing
    sprite: _HL2/mob/clothing/head.rsi
    clothingVisuals:
      head:
      - state: steel_helmet
  - type: Armor
    modifiers:
      coefficients:
        Blunt: 0.8
        Slash: 0.8
        Piercing: 0.85
        Heat: 0.9
  - type: HideLayerClothing
    layers:
      HeadTop: HEAD
      HeadSide: HEAD
      Hair: HEAD
      Head: HEAD

