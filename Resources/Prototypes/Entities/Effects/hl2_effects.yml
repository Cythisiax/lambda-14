# #Misfits Change - HL2 Effects & Decal Prototypes
# Sprites ported from halflife-episode13 (Marmio64)

# ===== EFFECTS =====
- type: entity
  name: fire
  parent: BaseItem
  id: EffectFireHL2
  description: A blazing fire.
  components:
  - type: Sprite
    sprite: _HL2/effects/fire.rsi
    state: red_1

- type: entity
  name: smoke
  parent: BaseItem
  id: EffectSmokeHL2
  description: Thick smoke.
  components:
  - type: Sprite
    sprite: _HL2/effects/smoke.rsi
    state: icon

- type: entity
  name: road decal
  parent: BaseItem
  id: DecalRoadHL2
  description: A road marking.
  components:
  - type: Sprite
    sprite: _HL2/effects/road_decals.rsi
    state: icon
  - type: Transform
    anchored: true

- type: entity
  name: wall covering
  parent: BaseItem
  id: WallCoveringHL2
  description: Wallpaper or paneling.
  components:
  - type: Sprite
    sprite: _HL2/effects/wallcovering.rsi
    state: icon
  - type: Transform
    anchored: true

- type: entity
  name: particles
  parent: BaseItem
  id: EffectParticlesHL2
  description: Floating particles.
  components:
  - type: Sprite
    sprite: _HL2/effects/generic_particles.rsi
    state: icon

# ===== AMMO =====
