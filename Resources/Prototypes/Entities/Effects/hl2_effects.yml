- type: entity
  name: pulse SMG battery
  parent: BaseItem
  id: CellPulseSMGHL2
  description: A power cell for a pulse SMG.
  components:
  - type: Sprite
    sprite: _HL2/obj/guns/ammo.rsi
    state: pulsesmg-full

